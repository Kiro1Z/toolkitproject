<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Writer's Word Counter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">

<style>
footer {
    margin-top: auto;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid d-flex align-items-center px-2">
    <button onclick="toggleSidebar()" class="btn btn-outline-light btn-sm nav-icon-btn me-2" aria-label="Open sidebar"><i class="fas fa-bars"></i></button>
    <span class="navbar-brand"><i class="fas fa-keyboard"></i> Xndr's Toolkit: Writer's Word Counter</span>
    <div class="d-flex gap-1 align-items-center ms-auto">
        <a href="index.html" class="btn btn-outline-light btn-sm page-link nav-icon-btn" aria-label="Back to home"><i class="fas fa-home"></i></a>
        <button onclick="toggleDarkMode()" class="btn btn-outline-light btn-sm nav-icon-btn" aria-label="Toggle dark mode"><i class="fas fa-moon"></i></button>
    </div>
</div>
</nav>

<section class="p-3 text-center">
<h1>Manuscript Word Counter</h1>
<p>Type your text and watch the word count update in real time.</p>

<div class="my-4">
    <div class="card-custom p-3 mx-auto" style="max-width: 320px;">
        <h2 class="mb-0">Words: <span id="topWordCount" style="font-size: 2.5rem; font-weight: 700;">0</span></h2>
    </div>
</div>

<div class="container mt-2">
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card-custom">
            <label for="manuscriptText">Enter your manuscript:</label>
            <textarea id="manuscriptText" class="form-control mb-3" rows="10" placeholder="Start typing your manuscript here..."></textarea>
            <div class="word-count text-end">
                Word Count: <span id="wordCount">0</span>
            </div>
        </div>
    </div>
</div>
</div>
</section>

<footer>
<p>&copy; 2026 xrlsndr.</p>
</footer>

<script>
/* ===== DARK MODE ===== */
function initializeDarkMode() {
    const isDarkMode = localStorage.getItem('darkMode') === 'enabled';
    if (isDarkMode) {
        document.body.classList.add('dark-mode');
    }
}

function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
    const isDarkMode = document.body.classList.contains('dark-mode');
    localStorage.setItem('darkMode', isDarkMode ? 'enabled' : 'disabled');
}

/* ===== SIDEBAR ===== */
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const body = document.body;
    
    sidebar.classList.toggle('open');
    overlay.classList.toggle('open');
    body.classList.toggle('sidebar-open');
}

/* ===== PAGE TRANSITIONS ===== */
function setupPageTransition() {
    document.querySelectorAll('a.page-link').forEach(link => {
        const href = link.getAttribute('href');
        if (!href || href.startsWith('#')) return;
        link.addEventListener('click', function(event) {
            event.preventDefault();
            toggleSidebar(); // Close sidebar first
            document.body.classList.add('fade-out');
            setTimeout(() => window.location.href = href, 300);
        });
    });
}

window.addEventListener('DOMContentLoaded', () => {
    initializeDarkMode();
    setupPageTransition();
    document.getElementById('sidebar-overlay').addEventListener('click', toggleSidebar);
});

/* ===== WORD COUNTER ===== */
const textarea = document.getElementById("manuscriptText");
const wordCountDisplay = document.getElementById("wordCount");
const topWordCountDisplay = document.getElementById("topWordCount");

textarea.addEventListener("input", function () {
    let text = textarea.value.trim();
    let words = 0;
    let matches = text.match(/\b[\w'-]{2,}\b/g);
    if (matches) {
        words = matches.filter(word => {
            // Require at least one letter (excludes pure numbers and special chars)
            return /[a-zA-Z]/.test(word);
        }).length;
    }
    wordCountDisplay.textContent = words;
    topWordCountDisplay.textContent = words;
});
</script>

<div id="sidebar" class="sidebar">
    <button onclick="toggleSidebar()" class="close-btn">&times;</button>
    <ul class="sidebar-menu">
        <li><a href="index.html" class="page-link"><i class="fas fa-home"></i> Home</a></li>
        <li><a href="metronome.html" class="page-link"><i class="fas fa-music"></i> Metronome</a></li>
        <li><a href="booking.html" class="page-link"><i class="fas fa-camera"></i> Booking</a></li>
    </ul>
</div>

<div id="sidebar-overlay" class="sidebar-overlay"></div>

</body>
</html>
